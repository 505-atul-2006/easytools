<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JPEG to PDF</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #e0eafc, #cfdef3);
      --fg: #222;
      --box: #ffffffee;
    }
    [data-theme="dark"] {
      --bg: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      --fg: #f8f9fa;
      --box: #1e1e1e;
    }
    html, body {
      margin: 0;
      height: 100%;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.5s ease, color 0.5s ease;
    }
    .container {
      background: var(--box);
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 600px;
      width: 90%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      text-align: center;
    }
    .drop-zone {
      border: 2px dashed var(--fg);
      padding: 40px 20px;
      margin: 15px 0;
      border-radius: 10px;
      background: transparent;
      transition: background 0.3s;
      cursor: pointer;
    }
    .drop-zone:hover {
      background-color: rgba(0,0,0,0.05);
    }
    input[type=file] {
      display: none;
    }
    button {
      padding: 12px 25px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 15px;
    }
    button:hover {
      background-color: #0056b3;
    }
    #downloadLink {
      display: none;
      margin-top: 20px;
      font-weight: bold;
      text-decoration: none;
      color: #28a745;
    }
    .toggle-theme {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: 2px solid var(--fg);
      color: var(--fg);
      padding: 5px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <button class="toggle-theme" onclick="toggleTheme()">🌓Dark mode</button>
  <div class="container">
    <h2>🖼️ JPEG to PDF</h2>
    <div class="drop-zone" onclick="document.getElementById('imageInput').click()" ondragover="event.preventDefault()" ondrop="handleDrop(event)">
      Drag & Drop JPEGs here or click to select
    </div>
    <input type="file" id="imageInput" accept="image/jpeg" multiple><br>
    <button onclick="convertToPDF()">Convert to PDF</button>
    <a id="downloadLink">Download PDF</a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
    }

    function handleDrop(e) {
      e.preventDefault();
      document.getElementById('imageInput').files = e.dataTransfer.files;
    }

    async function convertToPDF() {
      const input = document.getElementById('imageInput');
      const files = Array.from(input.files);
      if (!files.length) return alert("Please select JPEG images.");

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();
      let first = true;

      for (const file of files) {
        const reader = new FileReader();
        await new Promise((resolve) => {
          reader.onload = function (e) {
            const img = new Image();
            img.src = e.target.result;
            img.onload = function () {
              const width = pdf.internal.pageSize.getWidth();
              const height = (img.height / img.width) * width;
              if (!first) pdf.addPage();
              pdf.addImage(img, 'JPEG', 0, 0, width, height);
              first = false;
              resolve();
            };
          };
          reader.readAsDataURL(file);
        });
      }

      const blob = pdf.output('blob');
      const link = document.getElementById('downloadLink');
      link.href = URL.createObjectURL(blob);
      link.download = 'images.pdf';
      link.style.display = 'inline-block';
      link.textContent = 'Download PDF';
    }
  </script>
</body>
</html>
